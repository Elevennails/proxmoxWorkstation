---
- name: Ensure python3-passlib is installed (required by password_hash filter)
  ansible.builtin.apt:
    name: python3-passlib
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Generate 21-character random root password
  ansible.builtin.set_fact:
    root_password: "{{ lookup('password', '/dev/null length=21 chars=ascii_letters,digits') }}"
  no_log: true

- name: Set root password to the generated value
  ansible.builtin.user:
    name: root
    password: "{{ root_password | password_hash('sha512') }}"
    update_password: always
  no_log: true

- name: Disable remote root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*#?\s*PermitRootLogin'
    line: 'PermitRootLogin no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart ssh

- name: Prevent root console login (empty /etc/securetty)
  ansible.builtin.copy:
    dest: /etc/securetty
    content: ""
    owner: root
    group: root
    mode: "0600"

- name: Display new root password
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - "Root account hardened:"
      - "  - SSH remote root login:  disabled (PermitRootLogin no)"
      - "  - Console (tty) root login: disabled (/etc/securetty emptied)"
      - ""
      - "New random root password (21 chars, save it NOW):"
      - ""
      - "    {{ root_password }}"
      - ""
      - "This is the only time the password will be shown."
      - "================================================================"
