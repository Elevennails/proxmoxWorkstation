---
- name: Ensure logind drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure logind power handling (ignore lid, power button = shutdown)
  ansible.builtin.copy:
    dest: /etc/systemd/logind.conf.d/10-workstation-power.conf
    content: |
      [Login]
      HandleLidSwitch=ignore
      HandleLidSwitchExternalPower=ignore
      HandleLidSwitchDocked=ignore
      HandlePowerKey=poweroff
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-logind

- name: Configure Xwrapper to allow console users to start X
  ansible.builtin.copy:
    dest: /etc/X11/Xwrapper.config
    content: |
      allowed_users=console
      needs_root_rights=no
    owner: root
    group: root
    mode: "0644"

- name: Write ~/.xinitrc to launch openbox
  ansible.builtin.copy:
    dest: "/home/{{ workstation_user }}/.xinitrc"
    content: |
      #!/bin/sh
      eval "$(dbus-launch --sh-syntax)"
      exec openbox-session
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0755"

- name: Ensure openbox config directory exists
  ansible.builtin.file:
    path: "/home/{{ workstation_user }}/.config/openbox"
    state: directory
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0755"

- name: Install openbox rc.xml (ported from source workstation)
  ansible.builtin.copy:
    src: rc.xml
    dest: "/home/{{ workstation_user }}/.config/openbox/rc.xml"
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0644"

- name: Install openbox autostart (ported from source workstation)
  ansible.builtin.copy:
    src: autostart
    dest: "/home/{{ workstation_user }}/.config/openbox/autostart"
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0755"

- name: Install auto-DPI helper invoked from openbox autostart
  ansible.builtin.copy:
    src: auto-dpi.sh
    dest: "/home/{{ workstation_user }}/.config/openbox/auto-dpi.sh"
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0755"

- name: Ensure devilspie2 config directory exists
  ansible.builtin.file:
    path: "/home/{{ workstation_user }}/.config/devilspie2"
    state: directory
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0755"

- name: Install devilspie2 master config (registers script for open + focus events)
  ansible.builtin.copy:
    src: devilspie2.lua
    dest: "/home/{{ workstation_user }}/.config/devilspie2/devilspie2.lua"
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0644"

- name: Install devilspie2 rules for Proxmox console window routing
  ansible.builtin.copy:
    src: proxmox-routing.lua
    dest: "/home/{{ workstation_user }}/.config/devilspie2/proxmox-routing.lua"
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0644"

- name: Ensure user config directory exists
  ansible.builtin.file:
    path: "/home/{{ workstation_user }}/.config"
    state: directory
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0755"

- name: Register remote-viewer as default handler for Proxmox SPICE (.vv) files
  ansible.builtin.copy:
    dest: "/home/{{ workstation_user }}/.config/mimeapps.list"
    content: |
      [Default Applications]
      application/x-virt-viewer=remote-viewer.desktop
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: "0644"

- name: Register .vv glob with the shared MIME database
  ansible.builtin.copy:
    src: virt-viewer-mime.xml
    dest: /usr/share/mime/packages/virt-viewer-mime.xml
    owner: root
    group: root
    mode: "0644"
  register: vv_mime_package

- name: Rebuild the shared MIME database
  ansible.builtin.command: update-mime-database /usr/share/mime
  when: vv_mime_package.changed

