---
# workstation_user is prompted for at playbook start (see site.yml vars_prompt)
workstation_user_comment: "Workstation user"
workstation_user_groups:
  - sudo
  - video
  - input
  - audio
  - tty

# SSH pubkeys are fetched live from https://github.com/<user>.keys
workstation_github_user: Elevennails

tmux_repo: "https://github.com/Elevennails/tmux_dotfiles"
nvim_repo: "https://github.com/Elevennails/kickstart.nvim"

# Neovim release tag — "stable" tracks the latest stable, or pin (e.g. "v0.10.2").
neovim_release: "stable"
neovim_tarball: "nvim-linux-x86_64.tar.gz"
neovim_install_root: /opt
neovim_install_dir: /opt/nvim-linux-x86_64
neovim_bin_symlink: /usr/local/bin/nvim

workstation_apt_packages:
  - git
  - tmux
  - xorg
  - xinit
  - xserver-xorg-legacy
  - dbus-x11
  - openbox
  - xterm
  - slock
  - chromium
  - virt-viewer
  - xdg-utils
  - libfile-mimeinfo-perl
  - unzip
  - fontconfig

# Nerd Fonts — patched dev fonts from ryanoasis/nerd-fonts
nerdfonts_version: "v3.2.1"
nerdfonts_install_dir: /usr/local/share/fonts/NerdFonts
nerdfonts_list:
  - JetBrainsMono
